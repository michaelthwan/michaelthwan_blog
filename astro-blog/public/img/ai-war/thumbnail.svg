<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <rect width="400" height="240" fill="#fafafa"/>

  <!-- Layer bands -->
  <g stroke="#e8e8e8" stroke-width="1" stroke-dasharray="4,4">
    <line x1="20" y1="105" x2="380" y2="105"/>
    <line x1="20" y1="170" x2="380" y2="170"/>
  </g>
  <g fill="#bbb" font-family="Inter, system-ui, sans-serif" font-size="8" letter-spacing="1.5">
    <text x="24" y="52">MODEL</text>
    <text x="24" y="140">COMPUTE</text>
    <text x="24" y="208">SILICON</text>
  </g>

  <!-- Arrow markers -->
  <defs>
    <marker id="aeq" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8250df"/>
    </marker>
    <marker id="aco" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a7f37"/>
    </marker>
  </defs>

  <!-- Nodes: model layer -->
  <g>
    <rect x="105" y="55" width="80" height="34" rx="6" fill="#fff" stroke="#d1d9e0" stroke-width="1.2"/>
    <text x="145" y="76" fill="#333" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">OpenAI</text>

    <rect x="230" y="55" width="88" height="34" rx="6" fill="#fff" stroke="#d1d9e0" stroke-width="1.2"/>
    <text x="274" y="76" fill="#333" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" text-anchor="middle">Anthropic</text>
  </g>

  <!-- Nodes: compute layer -->
  <g>
    <rect x="105" y="120" width="80" height="32" rx="6" fill="#fff" stroke="#d1d9e0" stroke-width="1.2"/>
    <text x="145" y="140" fill="#333" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Oracle</text>

    <rect x="230" y="120" width="88" height="32" rx="6" fill="#fff" stroke="#d1d9e0" stroke-width="1.2"/>
    <text x="274" y="140" fill="#333" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">Clouds</text>
  </g>

  <!-- Nodes: silicon layer -->
  <rect x="105" y="185" width="213" height="32" rx="6" fill="#fff" stroke="#d1d9e0" stroke-width="1.2"/>
  <text x="211" y="205" fill="#333" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" text-anchor="middle">NVIDIA</text>

  <!-- Equity arrows (purple) -->
  <g fill="none" stroke="#8250df" stroke-width="2">
    <polyline points="130,185 130,95 138,95" marker-end="url(#aeq)" transform="translate(0,0)"/>
    <polyline points="295,185 295,158" marker-end="url(#aeq)"/>
    <polyline points="352,200 352,72 324,72" marker-end="url(#aeq)"/>
  </g>

  <!-- Cooperation arrows (green) -->
  <g fill="none" stroke="#1a7f37" stroke-width="2">
    <polyline points="145,89 145,114" marker-end="url(#aco)"/>
    <polyline points="274,89 274,114" marker-end="url(#aco)"/>
    <polyline points="185,136 224,136" marker-end="url(#aco)"/>
  </g>

  <!-- Title -->
  <text x="200" y="24" fill="#333" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" text-anchor="middle">The AI Investment War</text>
</svg>
