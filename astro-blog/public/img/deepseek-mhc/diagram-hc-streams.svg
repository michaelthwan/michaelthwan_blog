  <line x1="242" y1="38" x2="312" y2="36" stroke="#a0cdb0" stroke-width="1.2" marker-end="url(#hcb)"/>
  <line x1="242" y1="66" x2="312" y2="84" stroke="#a0cdb0" stroke-width="1.2" marker-end="url(#hcb)"/>
  <line x1="242" y1="94" x2="312" y2="132" stroke="#a0cdb0" stroke-width="1.2" marker-end="url(#hcb)"/>

