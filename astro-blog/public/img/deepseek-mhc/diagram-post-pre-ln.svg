<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 160">
  <defs>
    <marker id="ga" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L0,6 L6,3 z" fill="#888"/></marker>
  </defs>

  <!-- POST-LN (left) -->
  <text x="100" y="18" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#333">Post-LN (original Transformer)</text>

  <!-- Input arrow -->
  <line x1="100" y1="22" x2="100" y2="28" stroke="#888" stroke-width="1.3" marker-end="url(#ga)"/>

  <!-- Sublayer box -->
  <rect x="50" y="30" width="100" height="28" rx="4" fill="#fff3e0" stroke="#ffb74d" stroke-width="1.2"/>
  <text x="100" y="48" font-family="Inter,system-ui,sans-serif" font-size="10" text-anchor="middle" fill="#e65100">Sublayer</text>

  <!-- Arrow down -->
  <line x1="100" y1="58" x2="100" y2="72" stroke="#888" stroke-width="1.3" marker-end="url(#ga)"/>

  <!-- Add circle -->
  <circle cx="100" cy="84" r="13" fill="none" stroke="#555" stroke-width="1.3"/>
  <text x="100" y="89" font-family="Inter,system-ui,sans-serif" font-size="13" text-anchor="middle" fill="#333">&#x2295;</text>

  <!-- Arrow down -->
  <line x1="100" y1="97" x2="100" y2="108" stroke="#888" stroke-width="1.3" marker-end="url(#ga)"/>

  <!-- LN box -->
  <rect x="63" y="110" width="74" height="26" rx="4" fill="#f3e5f5" stroke="#ba68c8" stroke-width="1.2"/>
  <text x="100" y="127" font-family="Inter,system-ui,sans-serif" font-size="10" text-anchor="middle" fill="#6a1b9a">LayerNorm</text>

  <!-- Skip arc -->
  <path d="M42,44 Q18,84 84,84" fill="none" stroke="#b0c4de" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#ga)"/>

  <!-- Warning label -->
  <text x="100" y="152" font-family="Inter,system-ui,sans-serif" font-size="8.5" text-anchor="middle" fill="#c62828">&#x26A0; gradient instability near input</text>

  <!-- Separator -->
  <line x1="220" y1="10" x2="220" y2="148" stroke="#e8e8e8" stroke-width="1"/>

  <!-- PRE-LN (right) -->
  <text x="350" y="18" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="600" text-anchor="middle" fill="#333">Pre-LN (GPT-2 onward)</text>

  <!-- Input arrow -->
  <line x1="350" y1="22" x2="350" y2="28" stroke="#888" stroke-width="1.3" marker-end="url(#ga)"/>

  <!-- LN first -->
  <rect x="300" y="30" width="100" height="28" rx="4" fill="#f3e5f5" stroke="#ba68c8" stroke-width="1.2"/>
  <text x="350" y="48" font-family="Inter,system-ui,sans-serif" font-size="10" text-anchor="middle" fill="#6a1b9a">LayerNorm</text>

  <!-- Arrow down -->
  <line x1="350" y1="58" x2="350" y2="68" stroke="#888" stroke-width="1.3" marker-end="url(#ga)"/>

  <!-- Sublayer -->
  <rect x="300" y="70" width="100" height="28" rx="4" fill="#fff3e0" stroke="#ffb74d" stroke-width="1.2"/>
  <text x="350" y="88" font-family="Inter,system-ui,sans-serif" font-size="10" text-anchor="middle" fill="#e65100">Sublayer</text>

  <!-- Arrow down -->
  <line x1="350" y1="98" x2="350" y2="108" stroke="#888" stroke-width="1.3" marker-end="url(#ga)"/>

  <!-- Add circle -->
  <circle cx="350" cy="120" r="13" fill="none" stroke="#555" stroke-width="1.3"/>
  <text x="350" y="125" font-family="Inter,system-ui,sans-serif" font-size="13" text-anchor="middle" fill="#333">&#x2295;</text>

  <!-- Skip arc -->
  <path d="M292,44 Q270,120 335,120" fill="none" stroke="#b0c4de" stroke-width="1.3" stroke-dasharray="4,3" marker-end="url(#ga)"/>

  <!-- Warning label -->
  <text x="350" y="152" font-family="Inter,system-ui,sans-serif" font-size="8.5" text-anchor="middle" fill="#c62828">&#x26A0; representation collapse at depth</text>
</svg>
