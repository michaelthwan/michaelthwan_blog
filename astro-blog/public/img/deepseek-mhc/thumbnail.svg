<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 230">
  <rect width="400" height="230" fill="#fafafa"/>

  <!-- Left stream column label -->
  <text x="72" y="22" fill="#888" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">streams</text>

  <!-- Left stream boxes (input side) -->
  <rect x="30" y="32" width="84" height="26" rx="4" fill="#e3eaf5" stroke="#b0c4de" stroke-width="1"/>
  <text x="72" y="49" fill="#1a3a6b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">h⁽¹⁾</text>

  <rect x="30" y="68" width="84" height="26" rx="4" fill="#e3eaf5" stroke="#b0c4de" stroke-width="1"/>
  <text x="72" y="85" fill="#1a3a6b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">h⁽²⁾</text>

  <rect x="30" y="104" width="84" height="26" rx="4" fill="#e3eaf5" stroke="#b0c4de" stroke-width="1"/>
  <text x="72" y="121" fill="#1a3a6b" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">h⁽³⁾</text>

  <!-- W matrix in the center -->
  <rect x="150" y="28" width="100" height="108" rx="6" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="200" y="20" fill="#555" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="middle">W ∈ 𝓑ₙ</text>

  <!-- 3x3 matrix cells with doubly-stochastic coloring -->
  <!-- Row 1 -->
  <rect x="156" y="34" width="27" height="27" rx="2" fill="#1565c0" opacity="0.75"/>
  <rect x="187" y="34" width="27" height="27" rx="2" fill="#1565c0" opacity="0.14"/>
  <rect x="218" y="34" width="27" height="27" rx="2" fill="#1565c0" opacity="0.11"/>
  <!-- Row 2 -->
  <rect x="156" y="65" width="27" height="27" rx="2" fill="#1565c0" opacity="0.10"/>
  <rect x="187" y="65" width="27" height="27" rx="2" fill="#1565c0" opacity="0.72"/>
  <rect x="218" y="65" width="27" height="27" rx="2" fill="#1565c0" opacity="0.18"/>
  <!-- Row 3 -->
  <rect x="156" y="96" width="27" height="27" rx="2" fill="#1565c0" opacity="0.15"/>
  <rect x="187" y="96" width="27" height="27" rx="2" fill="#1565c0" opacity="0.14"/>
  <rect x="218" y="96" width="27" height="27" rx="2" fill="#1565c0" opacity="0.71"/>

  <!-- cell text -->
  <text x="169" y="52" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="8" text-anchor="middle">.75</text>
  <text x="200" y="52" fill="#444" font-family="Inter, system-ui, sans-serif" font-size="8" text-anchor="middle">.14</text>
  <text x="231" y="52" fill="#444" font-family="Inter, system-ui, sans-serif" font-size="8" text-anchor="middle">.11</text>

  <text x="169" y="83" fill="#444" font-family="Inter, system-ui, sans-serif" font-size="8" text-anchor="middle">.10</text>
  <text x="200" y="83" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="8" text-anchor="middle">.72</text>
  <text x="231" y="83" fill="#444" font-family="Inter, system-ui, sans-serif" font-size="8" text-anchor="middle">.18</text>

  <text x="169" y="114" fill="#444" font-family="Inter, system-ui, sans-serif" font-size="8" text-anchor="middle">.15</text>
  <text x="200" y="114" fill="#444" font-family="Inter, system-ui, sans-serif" font-size="8" text-anchor="middle">.14</text>
  <text x="231" y="114" fill="#fff" font-family="Inter, system-ui, sans-serif" font-size="8" text-anchor="middle">.71</text>

  <!-- Row/col sum labels -->
  <text x="252" y="50" fill="#27ae60" font-family="Inter, system-ui, sans-serif" font-size="7.5">= 1</text>
  <text x="252" y="81" fill="#27ae60" font-family="Inter, system-ui, sans-serif" font-size="7.5">= 1</text>
  <text x="252" y="112" fill="#27ae60" font-family="Inter, system-ui, sans-serif" font-size="7.5">= 1</text>

  <!-- Right stream boxes (output side) -->
  <rect x="286" y="32" width="84" height="26" rx="4" fill="#e8f4ec" stroke="#a0cdb0" stroke-width="1"/>
  <text x="328" y="49" fill="#1a5c30" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">h̃⁽¹⁾</text>

  <rect x="286" y="68" width="84" height="26" rx="4" fill="#e8f4ec" stroke="#a0cdb0" stroke-width="1"/>
  <text x="328" y="85" fill="#1a5c30" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">h̃⁽²⁾</text>

  <rect x="286" y="104" width="84" height="26" rx="4" fill="#e8f4ec" stroke="#a0cdb0" stroke-width="1"/>
  <text x="328" y="121" fill="#1a5c30" font-family="Inter, system-ui, sans-serif" font-size="10" text-anchor="middle">h̃⁽³⁾</text>

  <!-- Arrows from streams to W matrix -->
  <line x1="114" y1="45" x2="150" y2="47" stroke="#b0c4de" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="114" y1="81" x2="150" y2="79" stroke="#b0c4de" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="114" y1="117" x2="150" y2="110" stroke="#b0c4de" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Arrows from W matrix to output streams -->
  <line x1="250" y1="47" x2="286" y2="45" stroke="#a0cdb0" stroke-width="1.2" marker-end="url(#arr2)"/>
  <line x1="250" y1="79" x2="286" y2="81" stroke="#a0cdb0" stroke-width="1.2" marker-end="url(#arr2)"/>
  <line x1="250" y1="110" x2="286" y2="117" stroke="#a0cdb0" stroke-width="1.2" marker-end="url(#arr2)"/>

  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#b0c4de"/>
    </marker>
    <marker id="arr2" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#a0cdb0"/>
    </marker>
  </defs>

  <!-- Divider -->
  <line x1="20" y1="155" x2="380" y2="155" stroke="#e8e8e8" stroke-width="0.8"/>

  <!-- Bottom: Sinkhorn label + convergence hint -->
  <text x="20" y="173" fill="#555" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="600">Sinkhorn-Knopp projection</text>
  <text x="20" y="190" fill="#888" font-family="Inter, system-ui, sans-serif" font-size="9">row-normalize  →  col-normalize  →  repeat</text>

  <!-- mini convergence bar -->
  <rect x="20" y="200" width="260" height="6" rx="3" fill="#e8e8e8"/>
  <rect x="20" y="200" width="200" height="6" rx="3" fill="#1565c0" opacity="0.7"/>
  <text x="288" y="208" fill="#888" font-family="Inter, system-ui, sans-serif" font-size="8">converged</text>

  <!-- Title -->
  <text x="380" y="220" fill="#bbb" font-family="Inter, system-ui, sans-serif" font-size="9" text-anchor="end">mHC · DeepSeek 2025</text>
</svg>
