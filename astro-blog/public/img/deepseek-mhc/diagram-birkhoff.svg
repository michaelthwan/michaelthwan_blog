<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 240">
  <!-- Hexagon fill -->
  <polygon points="130,18 222,68 222,158 130,208 38,158 38,68" fill="#1565c0" fill-opacity="0.06" stroke="#b0c4de" stroke-width="1.5"/>

  <!-- Interior label -->
  <text x="130" y="108" font-family="Inter,system-ui,sans-serif" font-size="10" text-anchor="middle" fill="#888">&#x1D4D1;&#x2083;</text>
  <text x="130" y="124" font-family="Inter,system-ui,sans-serif" font-size="8" text-anchor="middle" fill="#aaa">(all doubly stochastic</text>
  <text x="130" y="136" font-family="Inter,system-ui,sans-serif" font-size="8" text-anchor="middle" fill="#aaa">3&#xD7;3 matrices)</text>

  <!-- Vertex dots -->
  <circle cx="130" cy="18" r="4" fill="#1565c0"/>
  <circle cx="222" cy="68" r="4" fill="#1565c0"/>
  <circle cx="222" cy="158" r="4" fill="#1565c0"/>
  <circle cx="130" cy="208" r="4" fill="#1565c0"/>
  <circle cx="38" cy="158" r="4" fill="#1565c0"/>
  <circle cx="38" cy="68" r="4" fill="#1565c0"/>

  <!-- Vertex labels -->
  <text x="130" y="11" font-family="Inter,system-ui,sans-serif" font-size="9" text-anchor="middle" fill="#1a3a6b">P&#x2081;</text>
  <text x="230" y="68" font-family="Inter,system-ui,sans-serif" font-size="9" text-anchor="start" fill="#1a3a6b">P&#x2082;</text>
  <text x="230" y="160" font-family="Inter,system-ui,sans-serif" font-size="9" text-anchor="start" fill="#1a3a6b">P&#x2083;</text>
  <text x="130" y="222" font-family="Inter,system-ui,sans-serif" font-size="9" text-anchor="middle" fill="#1a3a6b">P&#x2084;</text>
  <text x="26" y="160" font-family="Inter,system-ui,sans-serif" font-size="9" text-anchor="end" fill="#1a3a6b">P&#x2085;</text>
  <text x="26" y="68" font-family="Inter,system-ui,sans-serif" font-size="9" text-anchor="end" fill="#1a3a6b">P&#x2086;</text>

  <!-- Vertex sub-labels: permutation matrix hint -->
  <text x="130" y="3" font-family="Inter,system-ui,sans-serif" font-size="7" text-anchor="middle" fill="#aaa">(perm. matrix)</text>

  <!-- W dot inside -->
  <circle cx="155" cy="100" r="6.5" fill="#e65100"/>
  <text x="168" y="104" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#e65100" font-weight="600">W</text>
  <text x="168" y="116" font-family="Inter,system-ui,sans-serif" font-size="7.5" fill="#e65100">(current weights)</text>
</svg>
