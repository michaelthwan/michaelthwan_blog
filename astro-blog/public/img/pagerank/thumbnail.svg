<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 230">
  <rect width="400" height="230" fill="#fafafa"/>

  <!-- Title -->
  <text x="200" y="22" fill="#333" font-family="Inter, system-ui, sans-serif"
        font-size="13" font-weight="600" text-anchor="middle">PageRank: Votes on the Web</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="8" refY="4"
            orient="auto" markerUnits="userSpaceOnUse">
      <polygon points="0,0 0,8 8,4" fill="#888"/>
    </marker>
  </defs>

  <!-- Edges (drawn first, behind nodes) -->
  <!-- B(320,65) → A(200,115): start=(305,71) end=(225,105) -->
  <line x1="305" y1="71" x2="225" y2="105" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- D(80,65) → A(200,115): start=(92,70) end=(175,105) -->
  <line x1="92"  y1="70"  x2="175" y2="105" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- C(320,165) → A(200,115): start=(309,161) end=(224,125) -->
  <line x1="309" y1="161" x2="224" y2="125" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- E(80,165) → A(200,115): start=(97,158) end=(176,125) -->
  <line x1="97"  y1="158" x2="176" y2="125" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- B(320,65) → C(320,165): vertical right side -->
  <line x1="320" y1="81"  x2="320" y2="154" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- E(80,165) → D(80,65): vertical left side -->
  <line x1="80"  y1="147" x2="80"  y2="77"  stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Nodes (drawn on top of edges) -->
  <!-- A — hub, largest, darkest -->
  <circle cx="200" cy="115" r="26" fill="#2b2b2b"/>
  <text x="200" y="120" fill="white" font-family="Inter, system-ui, sans-serif"
        font-size="13" font-weight="700" text-anchor="middle">A</text>

  <!-- B — medium, secondary -->
  <circle cx="320" cy="65" r="17" fill="#555"/>
  <text x="320" y="70" fill="white" font-family="Inter, system-ui, sans-serif"
        font-size="12" font-weight="600" text-anchor="middle">B</text>

  <!-- E — medium -->
  <circle cx="80" cy="165" r="17" fill="#555"/>
  <text x="80" y="170" fill="white" font-family="Inter, system-ui, sans-serif"
        font-size="12" font-weight="600" text-anchor="middle">E</text>

  <!-- D — small -->
  <circle cx="80" cy="65" r="12" fill="#888"/>
  <text x="80" y="69" fill="white" font-family="Inter, system-ui, sans-serif"
        font-size="11" font-weight="500" text-anchor="middle">D</text>

  <!-- C — small -->
  <circle cx="320" cy="165" r="11" fill="#888"/>
  <text x="320" y="169" fill="white" font-family="Inter, system-ui, sans-serif"
        font-size="11" font-weight="500" text-anchor="middle">C</text>

  <!-- Legend -->
  <text x="200" y="213" fill="#aaa" font-family="Inter, system-ui, sans-serif"
        font-size="10" text-anchor="middle">Node size ∝ PageRank</text>
</svg>
