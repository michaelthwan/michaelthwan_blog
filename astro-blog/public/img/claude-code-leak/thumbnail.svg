<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <!-- Background -->
  <rect width="800" height="420" fill="#0f172a"/>

  <!-- Subtle grid lines -->
  <g stroke="#1e293b" stroke-width="1">
    <line x1="0" y1="60" x2="800" y2="60"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="360" x2="800" y2="360"/>
    <line x1="133" y1="0" x2="133" y2="420"/>
    <line x1="266" y1="0" x2="266" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="420"/>
    <line x1="533" y1="0" x2="533" y2="420"/>
    <line x1="666" y1="0" x2="666" y2="420"/>
  </g>

  <!-- Red glow blob -->
  <ellipse cx="160" cy="210" rx="160" ry="120" fill="#ef4444" opacity="0.08"/>
  <ellipse cx="640" cy="210" rx="120" ry="100" fill="#3b82f6" opacity="0.06"/>

  <!-- Broken lock icon -->
  <g transform="translate(88, 130)">
    <rect x="0" y="48" width="76" height="62" rx="8" fill="none" stroke="#ef4444" stroke-width="2.5"/>
    <!-- open shackle -->
    <path d="M14 48 L14 24 Q38 4 62 24 L62 40" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
    <!-- keyhole -->
    <circle cx="38" cy="76" r="8" fill="#ef4444" opacity="0.5"/>
    <rect x="34" y="76" width="8" height="14" rx="2" fill="#ef4444" opacity="0.5"/>
    <!-- crack -->
    <polyline points="38,55 32,68 44,72 36,88" fill="none" stroke="#f97316" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Main title -->
  <text x="400" y="158" text-anchor="middle"
        font-family="Inter, -apple-system, sans-serif"
        font-size="46" font-weight="800" fill="#f1f5f9" letter-spacing="-1">Claude Code Leak</text>

  <!-- Subtitle -->
  <text x="400" y="196" text-anchor="middle"
        font-family="Inter, -apple-system, sans-serif"
        font-size="16" fill="#64748b" letter-spacing="0.3">What 512,000 lines of source code revealed</text>

  <!-- Red pill badge -->
  <rect x="300" y="216" width="200" height="28" rx="14" fill="#ef4444" opacity="0.12"/>
  <rect x="300" y="216" width="200" height="28" rx="14" fill="none" stroke="#ef4444" stroke-width="1" opacity="0.35"/>
  <text x="400" y="235" text-anchor="middle"
        font-family="Inter, -apple-system, sans-serif"
        font-size="12" font-weight="600" fill="#fca5a5" letter-spacing="0.8">March 31, 2026 · npm v2.1.88</text>

  <!-- Feature tags row -->
  <g font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="500">
    <!-- KAIROS -->
    <rect x="52" y="278" width="72" height="22" rx="11" fill="#1e3a8a" opacity="0.7"/>
    <text x="88" y="293" text-anchor="middle" fill="#93c5fd">KAIROS</text>
    <!-- Daemon -->
    <rect x="132" y="278" width="68" height="22" rx="11" fill="#064e3b" opacity="0.7"/>
    <text x="166" y="293" text-anchor="middle" fill="#6ee7b7">Daemon</text>
    <!-- Undercover -->
    <rect x="208" y="278" width="88" height="22" rx="11" fill="#3b0764" opacity="0.7"/>
    <text x="252" y="293" text-anchor="middle" fill="#d8b4fe">Undercover</text>
    <!-- Buddy -->
    <rect x="304" y="278" width="58" height="22" rx="11" fill="#431407" opacity="0.7"/>
    <text x="333" y="293" text-anchor="middle" fill="#fdba74">Buddy</text>
    <!-- AutoDream -->
    <rect x="370" y="278" width="86" height="22" rx="11" fill="#083344" opacity="0.7"/>
    <text x="413" y="293" text-anchor="middle" fill="#67e8f9">AutoDream</text>
    <!-- SuperPlan -->
    <rect x="464" y="278" width="80" height="22" rx="11" fill="#052e16" opacity="0.7"/>
    <text x="504" y="293" text-anchor="middle" fill="#86efac">SuperPlan</text>
    <!-- Anti-Distill -->
    <rect x="552" y="278" width="96" height="22" rx="11" fill="#450a0a" opacity="0.7"/>
    <text x="600" y="293" text-anchor="middle" fill="#fca5a5">Anti-Distill</text>
    <!-- ReAct -->
    <rect x="656" y="278" width="60" height="22" rx="11" fill="#1e1b4b" opacity="0.7"/>
    <text x="686" y="293" text-anchor="middle" fill="#a5b4fc">ReAct</text>
  </g>

  <!-- Code lines decoration -->
  <g font-family="monospace" font-size="10" fill="#334155" opacity="0.5">
    <text x="52" y="336">// cur-session.ts · query.ts · undercover.ts</text>
    <text x="52" y="352">const kairos = await heartbeat.evaluate();</text>
    <text x="52" y="368">daemon.persist({ cron: '0 * * * *' });</text>
  </g>

  <!-- Bottom byline -->
  <text x="400" y="404" text-anchor="middle"
        font-family="Inter, -apple-system, sans-serif"
        font-size="11" fill="#334155" letter-spacing="0.3">Michael Wan Interactive Insights</text>
</svg>
